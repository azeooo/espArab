<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SIAPA KAMU? (مَنْ أَنْتَ؟)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Nunito:wght@700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="fonts.css">
    
    <style>

   @font-face {
  font-family: 'Azim';
  src: url('./fonts/Azim-Medium(MZR).otf') format('opentype');
  font-display: swap;
}
        * {
            -webkit-tap-highlight-color: transparent;
            -webkit-user-select: none;
            user-select: none;
        }
        *, *::before, *::after { box-sizing: border-box; }

        :root {
            --primary: #0066FF;
            --secondary: #FF006E;
            --accent1: #FFD60A;
            --accent2: #00D9FF;
            --accent3: #FF6B35;
            --bg-white: #FFFFFF;
            --desk-brown: #8B4513;
            --glow-blue: rgba(0,102,255,0.35);
            --glow-yellow: rgba(255,214,10,0.5);
            --glow-pink: rgba(255,0,110,0.35);
        }

        html, body {
            width: 100%;
            height: 100%;
            min-height: 100svh;
            min-height: 100dvh;
            margin: 0;
            padding: 0;
            overflow: hidden !important;
            overscroll-behavior: none;
            font-family: 'Azim', 'Nunito', 'Quicksand', sans-serif;
            position: relative;
            background: linear-gradient(160deg,#FFF9C4 0%,#FFF176 35%,#FFE082 70%,#FFCC40 100%);
            animation: bgShimmer 18s ease-in-out infinite alternate;
        }

        /* ─── BACKGROUND LAYERS ─── */
        body::before {
            content: "";
            position: absolute;
            inset: 0;
            pointer-events: none;
            z-index: 0;
            background-image:
                radial-gradient(circle, rgba(255,255,255,0.95) 2px, transparent 3px),
                radial-gradient(circle, rgba(255,255,255,0.7) 1.5px, transparent 3px),
                radial-gradient(circle, rgba(255,255,255,0.85) 2px, transparent 3px);
            background-size: 120px 120px, 160px 160px, 200px 200px;
            animation: sparkleMove 28s linear infinite;
        }

        body::after {
            content: "";
            position: absolute;
            inset: 0;
            pointer-events: none;
            z-index: 0;
            background-image: radial-gradient(circle, rgba(255,255,255,0.95) 3px, transparent 4px);
            background-size: 250px 250px;
            animation: twinkle 3s ease-in-out infinite alternate;
        }

        /* ─── DESK ─── */
        .desk-bg {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: clamp(90px, 18vh, 22vh);
            background: linear-gradient(to bottom, #F6C667, #E6A93C);
            border-top: 8px solid #D68B00;
            border-radius: 20px 20px 0 0;
            box-shadow:
                0 -5px 20px rgba(0,0,0,0.12),
                0 -1px 0 rgba(255,255,255,0.4) inset,
                0 -30px 40px rgba(255,200,80,0.3) inset;
            z-index: 0;
            pointer-events: none;
        }

        .desk-bg::before {
            content: "";
            position: absolute;
            inset: 0;
            border-radius: inherit;
            background-image:
                repeating-linear-gradient(
                    90deg,
                    transparent 0px,
                    transparent 48px,
                    rgba(180,110,0,0.08) 48px,
                    rgba(180,110,0,0.08) 50px
                );
        }

        .desk-bg::after {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 12px;
            background: linear-gradient(to bottom, rgba(255,255,255,0.35), transparent);
            border-radius: 20px 20px 0 0;
        }

        .arabic-text {
            font-family: 'Amiri', 'SakkalMajalla', serif;
            direction: rtl;
            unicode-bidi: embed;
        }

        @keyframes bgShimmer {
            0%   { filter: hue-rotate(0deg) brightness(1); }
            50%  { filter: hue-rotate(8deg) brightness(1.03); }
            100% { filter: hue-rotate(-4deg) brightness(1); }
        }

        @keyframes sparkleMove {
            from { background-position: 0 0, 50px 50px, 100px 100px; }
            to   { background-position: 0 500px, 50px 550px, 100px 600px; }
        }

        @keyframes twinkle {
            from { opacity: 0.4; }
            to   { opacity: 0.95; }
        }

        @keyframes floatIdle {
            0%, 100% { transform: translateY(0px) rotate(-1deg); }
            25%       { transform: translateY(-10px) rotate(0.5deg); }
            75%       { transform: translateY(-6px) rotate(-0.5deg); }
        }

        @keyframes glowPulse {
            0%, 100% { filter: drop-shadow(0 0 8px var(--glow-blue)) drop-shadow(0 0 20px var(--glow-yellow)); }
            50%       { filter: drop-shadow(0 0 18px var(--glow-blue)) drop-shadow(0 0 36px var(--glow-yellow)); }
        }

        @keyframes shineSweep {
            0%   { background-position: -200% center; }
            100% { background-position: 200% center; }
        }

        @keyframes popPress {
            0%   { transform: scale(1); }
            30%  { transform: scale(0.91); }
            65%  { transform: scale(1.07); }
            100% { transform: scale(1); }
        }

        @keyframes sparkle-pop {
            0%   { opacity: 1; transform: translate(0,0) scale(1) rotate(0deg); }
            100% { opacity: 0; transform: translate(var(--tx), var(--ty)) scale(0) rotate(360deg); }
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0) scale(1); }
            50%       { transform: translateY(-20px) scale(1.05); }
        }

        @keyframes blink-eyes {
            0%, 90%, 100% { transform: scaleY(1); }
            95%            { transform: scaleY(0.05); }
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0) rotateZ(0deg); }
            25%       { transform: translateX(-8px) rotateZ(-1.5deg); }
            75%       { transform: translateX(8px) rotateZ(1.5deg); }
        }

        @keyframes screenShake {
            0%,100% { transform: translateX(0); }
            15%     { transform: translateX(-5px); }
            30%     { transform: translateX(5px); }
            45%     { transform: translateX(-4px); }
            60%     { transform: translateX(4px); }
            80%     { transform: translateX(-2px); }
        }

        @keyframes bounce-reveal {
            0%   { filter: brightness(0); transform: scale(0.8) rotate(-3deg); }
            40%  { filter: brightness(1.3) drop-shadow(0 0 20px var(--accent1)); transform: scale(1.18) rotate(2deg); }
            70%  { transform: scale(0.96) rotate(-1deg); }
            100% { filter: brightness(1); transform: scale(1) rotate(0deg); }
        }

        @keyframes wobbleIn {
            0%   { opacity: 0; transform: scale(0.7) rotate(-4deg); }
            60%  { transform: scale(1.08) rotate(1.5deg); }
            80%  { transform: scale(0.97) rotate(-0.5deg); }
            100% { opacity: 1; transform: scale(1) rotate(0deg); }
        }

        @keyframes starDrop {
            0%   { opacity: 0; transform: translateY(-40px) scale(0.5); }
            60%  { transform: translateY(6px) scale(1.2); }
            80%  { transform: translateY(-3px) scale(0.95); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }

        @keyframes star-bounce {
            0%, 100% { transform: scale(1); }
            50%       { transform: scale(1.35); }
        }

        @keyframes pulseRing {
            0%   { box-shadow: 0 0 0 0 rgba(0,102,255,0.4), 0 0 0 0 rgba(255,214,10,0.3); opacity: 1; }
            100% { box-shadow: 0 0 0 28px rgba(0,102,255,0), 0 0 0 48px rgba(255,214,10,0); opacity: 0; }
        }

        @keyframes menuPopIn {
            0%   { opacity: 0; transform: scale(0.7) translateY(20px); }
            70%  { transform: scale(1.05) translateY(-4px); }
            100% { opacity: 1; transform: scale(1) translateY(0); }
        }

        @keyframes fade-in-popup {
            0%   { opacity: 0; transform: scale(0.8); }
            100% { opacity: 1; transform: scale(1); }
        }

        @keyframes correctFlash {
            0%   { opacity: 0.6; }
            100% { opacity: 0; }
        }

        @keyframes wrongFlash {
            0%   { opacity: 0.45; }
            100% { opacity: 0; }
        }

        @keyframes slide-up {
            0%   { opacity: 0; transform: translateY(20px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        .animate-bounce-custom       { animation: bounce 2.5s infinite cubic-bezier(0.36,0,0.66,-0.56); }
        .animate-blink-eyes          { animation: blink-eyes 3s infinite; transform-origin: center; }
        .animate-shake-button        { animation: shake 0.35s ease-in-out; }
        .animate-screen-shake        { animation: screenShake 0.35s ease-in-out; }
        .animate-pop-sparkle         { animation: sparkle-pop 0.8s ease-out forwards; }
        .animate-fade-popup          { animation: fade-in-popup 0.4s cubic-bezier(0.34,1.56,0.64,1); }
        .animate-slide-up            { animation: slide-up 0.5s ease-out; }
        .animate-bounce-reveal       { animation: bounce-reveal 0.7s cubic-bezier(0.34,1.56,0.64,1); }
        .animate-star-bounce         { animation: star-bounce 0.6s ease-in-out; }
        .animate-float-idle          { animation: floatIdle 3.2s ease-in-out infinite; }
        .animate-glow-pulse          { animation: glowPulse 2.5s ease-in-out infinite; }
        .animate-wobble-in           { animation: wobbleIn 0.5s cubic-bezier(0.34,1.56,0.64,1) both; }
        .animate-star-drop           { animation: starDrop 0.6s cubic-bezier(0.34,1.56,0.64,1) both; }
        .animate-menu-pop            { animation: menuPopIn 0.6s cubic-bezier(0.34,1.56,0.64,1) both; }

        .flash-overlay {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 999;
            border-radius: 0;
            opacity: 0;
        }
        .flash-correct {
            background: radial-gradient(ellipse at center, transparent 40%, rgba(0,220,120,0.45) 100%);
            animation: correctFlash 0.5s ease-out forwards;
        }
        .flash-wrong {
            background: radial-gradient(ellipse at center, transparent 40%, rgba(255,0,80,0.4) 100%);
            animation: wrongFlash 0.4s ease-out forwards;
        }

        .btn-primary {
            background: linear-gradient(160deg, #1A7FFF 0%, #0055DD 60%, #003FAA 100%);
            color: white;
            border: none;
            border-radius: clamp(14px, 4vw, 28px);
            padding: clamp(13px, 3vw, 19px) clamp(28px, 7vw, 42px);
            font-size: clamp(1.15rem, 3.2vw, 1.65rem);
            font-family: 'Nunito', sans-serif;
            font-weight: 900;
            cursor: pointer;
            transition: transform 0.18s ease, box-shadow 0.18s ease;
            box-shadow:
                0 7px 0 #003399,
                0 10px 20px rgba(0,80,200,0.35),
                inset 0 1px 0 rgba(255,255,255,0.3);
            position: relative;
            touch-action: manipulation;
            min-width: 130px;
            min-height: 52px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            letter-spacing: 0.5px;
        }

        .btn-primary::before {
            content: "";
            position: absolute;
            inset: 0;
            background: linear-gradient(110deg,
                transparent 20%,
                rgba(255,255,255,0.35) 45%,
                rgba(255,255,255,0.15) 55%,
                transparent 70%
            );
            background-size: 200% 100%;
            animation: shineSweep 2.8s ease-in-out infinite;
            border-radius: inherit;
        }

        .btn-primary:hover:not(:active) {
            transform: translateY(-3px);
            box-shadow:
                0 10px 0 #003399,
                0 16px 30px rgba(0,80,200,0.45),
                inset 0 1px 0 rgba(255,255,255,0.35);
        }
        .btn-primary:active {
            transform: translateY(5px);
            box-shadow: 0 2px 0 #003399, 0 4px 8px rgba(0,80,200,0.2), inset 0 1px 0 rgba(255,255,255,0.3);
            animation: popPress 0.25s ease-out;
        }
        .btn-primary:focus-visible {
            outline: 3px solid var(--accent1);
            outline-offset: 3px;
        }

        .btn-secondary {
            background: linear-gradient(160deg, #FF3D8A 0%, #E0005F 60%, #AA0048 100%);
            color: white;
            border: none;
            border-radius: clamp(14px, 4vw, 28px);
            padding: clamp(13px, 3vw, 19px) clamp(28px, 7vw, 42px);
            font-size: clamp(1.15rem, 3.2vw, 1.65rem);
            font-family: 'Nunito', sans-serif;
            font-weight: 900;
            cursor: pointer;
            transition: transform 0.18s ease, box-shadow 0.18s ease;
            box-shadow:
                0 7px 0 #880040,
                0 10px 20px rgba(200,0,80,0.3),
                inset 0 1px 0 rgba(255,255,255,0.3);
            position: relative;
            touch-action: manipulation;
            min-width: 130px;
            min-height: 52px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            letter-spacing: 0.5px;
        }

        .btn-secondary::before {
            content: "";
            position: absolute;
            inset: 0;
            background: linear-gradient(110deg,
                transparent 20%,
                rgba(255,255,255,0.32) 45%,
                rgba(255,255,255,0.12) 55%,
                transparent 70%
            );
            background-size: 200% 100%;
            animation: shineSweep 3.2s ease-in-out infinite;
            border-radius: inherit;
        }

        .btn-secondary:hover:not(:active) {
            transform: translateY(-3px);
            box-shadow: 0 10px 0 #880040, 0 16px 30px rgba(200,0,80,0.4), inset 0 1px 0 rgba(255,255,255,0.3);
        }
        .btn-secondary:active {
            transform: translateY(5px);
            box-shadow: 0 2px 0 #880040, 0 4px 8px rgba(200,0,80,0.2), inset 0 1px 0 rgba(255,255,255,0.3);
            animation: popPress 0.25s ease-out;
        }
        .btn-secondary:focus-visible {
            outline: 3px solid var(--accent1);
            outline-offset: 3px;
        }

        .btn-answer {
            background: linear-gradient(160deg, #FFFFFF 0%, #F0F6FF 100%);
            border: 3px solid #6BAEFF;
            border-radius: clamp(12px, 3.5vw, 20px);
            padding: clamp(10px, 2vw, 16px);
            cursor: pointer;
            transition: transform 0.18s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.18s ease, border-color 0.18s ease;
            min-height: 80px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 5px;
            position: relative;
            touch-action: manipulation;
            overflow: hidden;
            box-shadow:
                0 4px 0 rgba(0,100,220,0.2),
                0 6px 16px rgba(0,80,200,0.1),
                inset 0 1px 0 rgba(255,255,255,0.9);
        }

        .btn-answer::after {
            content: "";
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at var(--rx, 50%) var(--ry, 50%), rgba(0,102,255,0.15) 0%, transparent 70%);
            opacity: 0;
            transition: opacity 0.3s ease;
            border-radius: inherit;
        }
        .btn-answer:hover::after { opacity: 1; }

        .btn-answer::before {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 40%;
            background: linear-gradient(to bottom, rgba(255,255,255,0.7), transparent);
            border-radius: inherit;
            pointer-events: none;
        }

        .btn-answer:hover:not(:active):not(.correct):not(.wrong) {
            background: linear-gradient(160deg, #FFFBE6 0%, #FFF3B0 100%);
            border-color: var(--accent3);
            transform: translateY(-6px) scale(1.04);
            box-shadow:
                0 8px 0 rgba(220,120,0,0.2),
                0 14px 28px rgba(255,140,0,0.25),
                0 0 0 3px rgba(255,214,10,0.3),
                inset 0 1px 0 rgba(255,255,255,0.9);
        }

        .btn-answer:active:not(.correct):not(.wrong) {
            transform: translateY(0px) scale(0.95);
            animation: popPress 0.2s ease-out;
        }

        .btn-answer:focus-visible {
            outline: 3px solid var(--accent1);
            outline-offset: 2px;
        }

        .btn-answer.correct {
            background: linear-gradient(160deg, #B8FFED 0%, #00D9A8 100%);
            border-color: #00B890;
            box-shadow:
                0 4px 0 #009970,
                0 0 0 4px rgba(0,220,160,0.3),
                0 12px 24px rgba(0,180,140,0.3),
                inset 0 1px 0 rgba(255,255,255,0.7);
            transform: scale(1.04);
        }

        .btn-answer.wrong {
            background: linear-gradient(160deg, #FFE8EE 0%, #FFCCD8 100%);
            border-color: #FF4477;
            box-shadow:
                0 4px 0 rgba(220,0,60,0.2),
                0 0 0 3px rgba(255,60,100,0.2),
                inset 0 1px 0 rgba(255,255,255,0.7);
        }

        .game-container {
            width: 100%;
            height: 100dvh;
            display: flex;
            flex-direction: column;
            padding: clamp(12px,3vw,28px);
            gap: clamp(10px,2.5vw,18px);
            position: relative;
            z-index: 10;
        }

        .screen {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100dvh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: clamp(10px,2.5vw,22px);
            overflow: auto;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.35s ease, visibility 0.35s ease;
            z-index: 20;
            -webkit-overflow-scrolling: touch;
        }
        .screen.active { opacity: 1; visibility: visible; }

        .screen-menu { gap: clamp(18px,4.5vw,38px); }

        .menu-character {
            width: clamp(140px,32vw,210px);
            height: clamp(140px,32vw,210px);
            filter: drop-shadow(0 12px 24px rgba(0,80,200,0.3)) drop-shadow(0 4px 8px rgba(0,0,0,0.15));
        }

        .menu-title {
            font-size: clamp(2.4rem,8.5vw,3.8rem);
            font-weight: 900;
            color: var(--primary);
            text-align: center;
            line-height: 1.1;
            margin: 0;
            text-shadow:
                3px 3px 0 var(--accent1),
                6px 6px 0 rgba(0,80,200,0.15),
                0 0 30px rgba(0,102,255,0.2);
            letter-spacing: -0.5px;
        }

        .menu-subtitle {
            font-size: clamp(1.7rem,5.5vw,2.6rem);
            color: var(--secondary);
            margin: 0;
            text-shadow: 2px 2px 0 rgba(255,0,110,0.2);
        }

        .screen-game {
            justify-content: space-between;
            gap: clamp(8px,2vw,14px);
        }

        .game-header,
        .question-area {
            width: 100%;
            min-height: 0;
        }

        .progress-bar {
            flex: 1;
            height: clamp(14px,3.2vw,22px);
            background: linear-gradient(to right, #D0E8FF, #E8F4FF);
            border-radius: 12px;
            overflow: hidden;
            border: 2px solid rgba(0,102,255,0.25);
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.08);
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #FFD60A, #FF9D00, #00D9FF, #0066FF);
            background-size: 200% 100%;
            transition: width 0.5s ease;
            width: 0%;
            border-radius: inherit;
            position: relative;
            box-shadow: 0 0 8px rgba(0,150,255,0.4);
        }

        .step-counter {
            background: linear-gradient(135deg, #FF3D8A, #CC0055);
            color: white;
            padding: clamp(8px,2vw,12px) clamp(12px,3vw,18px);
            border-radius: 10px;
            font-weight: 900;
            font-size: clamp(0.9rem,2.5vw,1.2rem);
            min-width: 65px;
            text-align: center;
            box-shadow: 0 4px 0 #880040, 0 6px 12px rgba(200,0,80,0.2);
        }

        .question-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: clamp(14px,3.5vw,22px);
            width: 100%;
        }

        .question-text {
            font-size: clamp(1.7rem,4.5vw,2.4rem);
            color: var(--secondary);
            font-weight: 900;
            margin: 0;
            text-shadow: 2px 2px 0 rgba(255,0,110,0.18);
        }

        .silhouette-container {
            width: clamp(120px,36vw,250px);
            height: clamp(120px,36vw,250px);
            position: relative;
            margin: 0 auto;
        }

        .silhouette-container::before {
            content: "";
            position: absolute;
            inset: -8px;
            border-radius: 50%;
            pointer-events: none;
            z-index: 0;
        }

        .silhouette-container.pulsing::before {
            animation: pulseRing 0.8s ease-out forwards;
        }

        .silhouette {
            width: 100%;
            height: 100%;
            filter: brightness(0) contrast(1.2) drop-shadow(0 8px 16px rgba(0,0,0,0.3));
            transition: filter 0.6s cubic-bezier(0.34,1.56,0.64,1), transform 0.6s cubic-bezier(0.34,1.56,0.64,1);
            animation: floatIdle 3.2s ease-in-out infinite;
            position: relative;
            z-index: 1;
        }

        .silhouette.revealed {
            filter: brightness(1) contrast(1) drop-shadow(0 10px 24px rgba(0,0,0,0.2));
            animation: bounce-reveal 0.7s cubic-bezier(0.34,1.56,0.64,1), floatIdle 3.2s ease-in-out 0.7s infinite, glowPulse 2.5s ease-in-out 0.7s infinite;
        }

        .silhouette svg { width: 100%; height: 100%; }

        .options-grid {
            display: grid;
            grid-template-columns: repeat(2,1fr);
            gap: clamp(10px,2.5vw,14px);
            width: 100%;
            max-width: min(420px,94vw);
            max-height: min(44dvh,380px);
            overflow: auto;
            padding: 4px;
            -webkit-overflow-scrolling: touch;
        }

        .option-label {
            font-size: clamp(0.85rem,2.5vw,1.1rem);
            font-weight: 800;
            color: #1A2A44;
        }

        .option-arabic {
            font-size: clamp(1rem,3vw,1.45rem);
            font-weight: 700;
            color: var(--primary);
        }

        .feedback-text {
            font-size: clamp(1.4rem,4.2vw,2.1rem);
            font-weight: 900;
            color: #00B87A;

        // ==================== STATE ====================
        const STATE = {
            currentIndex: 0,
            correctAnswers: 0,
            wrongAttempts: 0,
            gameStarted: false,
            isAnswering: false
        };

        // ==================== EVENT LISTENERS ====================
        document.addEventListener('DOMContentLoaded', () => {
            setupEventListeners();

            // --- Audio init (placeholder-safe) ---
            initAudioPool();

            // --- Unlock audio on first gesture ---
            window.addEventListener('pointerdown', unlockAudioOnce, { once:true });
            window.addEventListener('keydown', () => unlockAudioOnce(), { once:true });

            // --- Storyboard: on entering menu screen -> giggle + menu BGM ---
            // (won't play if src empty; safe)
            playBGM('menu');
            playAudio('SFX_GIGGLE');
        });

        function setupEventListeners() {
            const btnStart   = document.getElementById('btn-start');
            const btnFaham   = document.getElementById('btn-faham');
            const btnRestart = document.getElementById('btn-restart');

            if (btnStart)   btnStart.addEventListener('click', openInstructions);
            if (btnFaham)   btnFaham.addEventListener('click', startGame);
            if (btnRestart) btnRestart.addEventListener('click', restartGame);
        }

        // ==================== GAME FLOW ====================
        function openInstructions() {
            playClickSound();
            document.getElementById('modal-instructions').classList.add('active');
        }

        function startGame() {
            playClickSound();
            document.getElementById('modal-instructions').classList.remove('active');

            // Storyboard: switch to gameplay -> game BGM
            playBGM('game');

            STATE.gameStarted     = true;
            STATE.currentIndex    = 0;
            STATE.correctAnswers  = 0;
            STATE.wrongAttempts   = 0;

            switchScreen('screen-game');
            loadQuestion();
        }

        function loadQuestion() {
            const item = STATIONERY_ITEMS[STATE.currentIndex];
            STATE.isAnswering = false;

            // Update header
            document.getElementById('step-current').textContent = STATE.currentIndex + 1;
            const progress = (STATE.currentIndex / STATIONERY_ITEMS.length) * 100;
            document.getElementById('progress-fill').style.width = progress + '%';

            // Update silhouette
            const silhouetteDiv = document.getElementById('silhouette');
            silhouetteDiv.innerHTML = item.svg;
            silhouetteDiv.style.color = item.color;
            silhouetteDiv.classList.remove('revealed');

            // Clear feedback
            const feedbackText = document.getElementById('feedback-text');
            feedbackText.textContent = '';
            feedbackText.classList.remove('show');

            // Generate options
            generateOptions(item);

            // =========================================================
            // STORYBOARD AUDIO (Skrin 2 - Teka-teki)
            // - VO: "Siapa kamu?"
            // - SFX/BGM: tick-tock thinking loop
            // =========================================================
            stopAllVO();
            playAudio('VO_RIDDLE');      // TODO fill path later
            startThinkingTick();         // TODO fill path later
        }

        function generateOptions(correctItem) {
            const optionsGrid = document.getElementById('options-grid');
            optionsGrid.innerHTML = '';

            const incorrectItems = STATIONERY_ITEMS.filter(item => item.id !== correctItem.id);
            const shuffledIncorrect = incorrectItems.sort(() => Math.random() - 0.5).slice(0, 3);
            const options = [correctItem, ...shuffledIncorrect].sort(() => Math.random() - 0.5);

            options.forEach((option, index) => {
                const btn = document.createElement('button');
                btn.className = 'btn-answer animate-wobble-in';
                btn.style.animationDelay = (index * 0.08) + 's';
                btn.dataset.itemId = option.id;
                btn.innerHTML = `
                    <span class="option-label">${option.malay}</span>
                    <span class="option-arabic arabic-text">${option.arabic}</span>
                `;

                btn.addEventListener('pointermove', (e) => {
                    const rect = btn.getBoundingClientRect();
                    const x = ((e.clientX - rect.left) / rect.width) * 100;
                    const y = ((e.clientY - rect.top) / rect.height) * 100;
                    btn.style.setProperty('--rx', x + '%');
                    btn.style.setProperty('--ry', y + '%');
                });

                btn.addEventListener('click', () => handleGuess(option.id, btn));
                optionsGrid.appendChild(btn);
            });
        }

        function handleGuess(selectedId, btnElement) {
            if (STATE.isAnswering) return;
            STATE.isAnswering = true;

            const correctItem = STATIONERY_ITEMS[STATE.currentIndex];

            if (selectedId === correctItem.id) {
                handleCorrectAnswer(btnElement);
            } else {
                handleWrongAnswer(btnElement);
            }
        }

        function handleCorrectAnswer(btnElement) {
            // stop thinking tick-tock when answer chosen
            stopThinkingTick();

            playCorrectSound(); // your synth beep stays
            // Storyboard: Tadaaa/Magic on correct
            playAudio('SFX_TADA'); // TODO fill path later

            STATE.correctAnswers++;

            btnElement.classList.add('correct');

            const silhouette = document.getElementById('silhouette');
            silhouette.classList.add('revealed', 'animate-bounce-reveal');

            const container = document.getElementById('silhouette-container');
            container.classList.add('pulsing');
            setTimeout(() => container.classList.remove('pulsing'), 900);

            const feedbackText = document.getElementById('feedback-text');
            feedbackText.textContent = '✨ أَحْسَنْتَ! ✨';
            feedbackText.classList.add('show');

            triggerFlash('correct');
            createSparkles();

            // =========================================================
            // STORYBOARD VO: item speaks after correct
            // - Book: "Tahniah! Saya Buku! أَنَا كِتَابٌ"
            // - Pen: "قَلَمٌ أَنَا"
            // - Ruler: "مِسْطَرَةٌ أَنَا"
            // - Sharpener: "مِبْرَاةٌ أَنَا"
            // - Eraser: placeholder "مِمْحَاةٌ أَنَا"
            // =========================================================
            const correctItem = STATIONERY_ITEMS[STATE.currentIndex];
            const voKey = voForItemId(correctItem.id);
            if (voKey) {
                stopAllVO();
                playAudio(voKey); // TODO fill path later
            }

            setTimeout(() => {
                STATE.currentIndex++;
                if (STATE.currentIndex < STATIONERY_ITEMS.length) {

                    // =========================================================
                    // STORYBOARD TRANSITION (Skrin 4 - Proses)
                    // - zip open + swoosh jump
                    // =========================================================
                    playAudio('SFX_ZIP');    // TODO fill
                    setTimeout(() => playAudio('SFX_SWOOSH'), 180); // TODO fill

                    loadQuestion();
                } else {
                    showResults();
                }
            }, 1800);
        }

        function handleWrongAnswer(btnElement) {
            // stop tick while we feedback wrong; resume after shake
            stopThinkingTick();

            playWrongSound(); // your synth beep stays
            // Storyboard: "Boing!" on wrong
            playAudio('SFX_BOING'); // TODO fill path later

            STATE.wrongAttempts++;

            btnElement.classList.add('wrong', 'animate-shake-button');

            const gameScreen = document.getElementById('screen-game');
            gameScreen.classList.add('animate-screen-shake');

            triggerFlash('wrong');

            setTimeout(() => {
                btnElement.classList.remove('animate-shake-button');
                gameScreen.classList.remove('animate-screen-shake');
                STATE.isAnswering = false;

                // resume tick-tock thinking after wrong feedback
                startThinkingTick();
            }, 360);
        }

        function showResults() {
            // stop thinking tick
            stopThinkingTick();

            switchScreen('screen-result');
            const totalQuestions = STATIONERY_ITEMS.length;

            document.getElementById('final-score').innerHTML = `
                <div>✅ Jawapan Betul: <strong>${STATE.correctAnswers}</strong></div>
                <div>❌ Jawapan Salah: <strong>${STATE.wrongAttempts}</strong></div>
                <div>📚 Jumlah Soalan: <strong>${totalQuestions}</strong></div>
            `;

            let stars = 3;
            if (STATE.wrongAttempts >= 5) stars = 1;
            else if (STATE.wrongAttempts >= 2) stars = 2;

            const starsContainer = document.getElementById('stars-container');
            starsContainer.innerHTML = '';
            for (let i = 0; i < 3; i++) {
                const star = document.createElement('span');
                star.className = 'star animate-star-drop';
                if (i >= stars) star.classList.add('inactive');
                star.textContent = '⭐';
                star.style.animationDelay = (i * 0.22) + 's';
                star.classList.add('animate-star-bounce');
                starsContainer.appendChild(star);
            }

            // =========================================================
            // STORYBOARD RESULT (Skrin 5)
            // - cheer/applause + VO closing line
            // =========================================================
            playAudio('SFX_CHEER');  // TODO fill
            stopAllVO();
            playAudio('VO_CLOSING'); // TODO fill
        }

        function restartGame() {
            STATE.currentIndex    = 0;
            STATE.score           = 0;
            STATE.wrongAttempts   = 0;
            STATE.gameStarted     = false;

            // Storyboard: back to menu -> menu BGM
            playBGM('menu');
            switchScreen('screen-menu');
        }

        // ==================== UTILITY FUNCTIONS ====================
        function switchScreen(screenId) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            const screen = document.getElementById(screenId);
            if (screen) screen.classList.add('active');
        }

        function triggerFlash(type) {
            const el = document.getElementById('flash-' + type);
            if (!el) return;
            el.style.display = 'block';
            el.className = 'flash-overlay flash-' + type;
            setTimeout(() => {
                el.style.display = 'none';
                el.className = 'flash-overlay';
            }, 520);
        }

        function createSparkles() {
            const container = document.getElementById('silhouette').parentElement;
            const emojis = ['✨','⭐','💛','🌟','💫'];
            for (let i = 0; i < 14; i++) {
                const sparkle = document.createElement('div');
                sparkle.style.cssText = `
                    position:absolute;
                    width:22px;height:22px;
                    pointer-events:none;
                    font-size:${14 + Math.random()*10}px;
                    z-index:10;
                `;
                sparkle.textContent = emojis[Math.floor(Math.random() * emojis.length)];

                const x = (Math.random() - 0.5) * 220;
                const y = (Math.random() - 0.5) * 220;
                sparkle.style.setProperty('--tx', x + 'px');
                sparkle.style.setProperty('--ty', y + 'px');
                sparkle.classList.add('animate-pop-sparkle');
                sparkle.style.left = '50%';
                sparkle.style.top  = '50%';
                sparkle.style.transform = 'translate(-50%,-50%)';
                sparkle.style.animationDelay = (Math.random() * 0.15) + 's';

                container.appendChild(sparkle);
                setTimeout(() => sparkle.remove(), 1000);
            }
        }

        // ── SOUNDS (your existing synth beeps - unchanged) ──
        function playClickSound() {
            try {
                const ac = new (window.AudioContext || window.webkitAudioContext)();
                const osc = ac.createOscillator();
                const gain = ac.createGain();
                osc.frequency.setValueAtTime(640, ac.currentTime);
                gain.gain.setValueAtTime(0.28, ac.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, ac.currentTime + 0.1);
                osc.connect(gain); gain.connect(ac.destination);
                osc.start(); osc.stop(ac.currentTime + 0.1);
            } catch(e){}
        }

        function playCorrectSound() {
            try {
                const ac = new (window.AudioContext || window.webkitAudioContext)();
                [523.25, 659.25, 783.99, 1046.5].forEach((freq, i) => {
                    const osc = ac.createOscillator();
                    const gain = ac.createGain();
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(freq, ac.currentTime);
                    gain.gain.setValueAtTime(0.18, ac.currentTime + i*0.09);
                    gain.gain.exponentialRampToValueAtTime(0.01, ac.currentTime + i*0.09 + 0.22);
                    osc.connect(gain); gain.connect(ac.destination);
                    osc.start(ac.currentTime + i*0.09);
                    osc.stop(ac.currentTime + i*0.09 + 0.22);
                });
            } catch(e){}
        }

        function playWrongSound() {
            try {
                const ac = new (window.AudioContext || window.webkitAudioContext)();
                const osc = ac.createOscillator();
                const gain = ac.createGain();
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(320, ac.currentTime);
                osc.frequency.linearRampToValueAtTime(180, ac.currentTime + 0.18);
                gain.gain.setValueAtTime(0.18, ac.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, ac.currentTime + 0.18);
                osc.connect(gain); gain.connect(ac.destination);
                osc.start(); osc.stop(ac.currentTime + 0.18);
            } catch(e){}
        }
    </script>
