<!DOCTYPE html>
<html lang="ms">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Halaman Interaktif Audio</title>

  <style>
    @font-face {
      font-family: 'Azim';
      src: url('../fonts/Azim.otf') format('opentype');
      font-display: swap;
    }
    @font-face {
      font-family: 'SakkalMajalla';
      src: url('../fonts/Sakkal-Majalla-Regular.ttf') format('truetype');
      font-display: swap;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    :root {
      --bg1: #7dd3fc;
      --bg2: #e1c5fe;
      --bg3: #f9a8d4;
      --bg4: #fde68a;
      --text: #24324a;
      --shadow: 0 20px 50px rgba(31,41,55,0.18);
      --radius: 30px;
      --accent: #6d5efc;
      --accent2: #ff7a59;

      --boy-w:  25vmin;
      --girl-w: 14vmin;
    }

    html, body {
      width: 100%;
      min-height: 100%;
      font-family: 'Azim', "Trebuchet MS", "Segoe UI", sans-serif;
      background: linear-gradient(135deg, var(--bg1), var(--bg2), var(--bg3), var(--bg4));
      background-size: 300% 300%;
      animation: bgShift 14s ease infinite;
      overflow-x: hidden;
      color: var(--text);
    }
    @keyframes bgShift {
      0%   { background-position: 0%   50%; }
      50%  { background-position: 100% 50%; }
      100% { background-position: 0%   50%; }
    }

    body {
      position: relative;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 18px 5vw;
    }

    /* ── Blobs ── */
    .blob { position:fixed; border-radius:50%; filter:blur(16px); opacity:.14; pointer-events:none; animation:floatBlob linear infinite; z-index:0; }
    .blob.b1 { width:220px; height:220px; background:#fff;    top:6%;   left:4%;   animation-duration:12s; }
    .blob.b2 { width:280px; height:280px; background:#ffd6e8; right:4%; top:15%;  animation-duration:16s; }
    .blob.b3 { width:180px; height:180px; background:#d9f99d; left:10%; bottom:8%;animation-duration:14s; }
    .blob.b4 { width:240px; height:240px; background:#bfdbfe; right:10%;bottom:6%;animation-duration:18s; }
    @keyframes floatBlob {
      0%   { transform:translateY(0)    translateX(0)    scale(1);    }
      25%  { transform:translateY(-18px)translateX(12px) scale(1.04); }
      50%  { transform:translateY(10px) translateX(-8px) scale(0.98); }
      75%  { transform:translateY(-10px)translateX(10px) scale(1.03); }
      100% { transform:translateY(0)    translateX(0)    scale(1);    }
    }

    /* ── Sparkles ── */
    .sparkles { position:fixed; inset:0; pointer-events:none; overflow:hidden; z-index:0; opacity:.7; }
    .sparkle {
      position:absolute; width:10px; height:10px; border-radius:50%;
      background:rgba(255,255,255,.9);
      box-shadow:0 0 10px rgba(255,255,255,.9),0 0 20px rgba(255,255,255,.5);
      animation:twinkle 3s ease-in-out infinite;
    }
    @keyframes twinkle { 0%,100%{transform:scale(.4);opacity:.2;} 50%{transform:scale(1.2);opacity:1;} }

    /* ── Clouds ── */
    .cloud-stage { position:fixed; inset:0; overflow:hidden; pointer-events:none; z-index:0; opacity:.7; }
    .cloud { position:absolute; animation-timing-function:linear; animation-iteration-count:infinite; filter:drop-shadow(0 8px 10px rgba(255,255,255,.18)); }
    .cloud img { width:100%; height:100%; object-fit:contain; display:none; }
    .cloud-fallback {
      width:100%; height:100%; border-radius:999px;
      background:rgba(255,255,255,.92); border:2px dashed rgba(178,205,255,.85);
      display:flex; align-items:center; justify-content:center; text-align:center;
      color:#8ca6c7; font-weight:900; font-size:.82rem; line-height:1.2; padding:10px;
      position:relative; overflow:visible;
    }
    .cloud-fallback::before,.cloud-fallback::after {
      content:""; position:absolute;
      background:rgba(255,255,255,.92); border:2px dashed rgba(178,205,255,.85);
      border-radius:50%; z-index:-1;
    }
    .cloud-fallback::before { width:42%; height:80%; left:10%;  top:-20%; }
    .cloud-fallback::after  { width:45%; height:85%; right:12%; top:-25%; }
    .cloud1 { width:300px; height:180px; top:7%;  left:-22%; animation:cloudMove1 28s linear infinite; }
    .cloud2 { width:200px; height:93px;  top:18%; left:-18%; animation:cloudMove2 34s linear infinite; }
    .cloud3 { width:290px; height:150px; top:12%; left:-26%; animation:cloudMove3 40s linear infinite; }
    @keyframes cloudMove1 { from{transform:translateX(0)} to{transform:translateX(145vw)} }
    @keyframes cloudMove2 { from{transform:translateX(0)} to{transform:translateX(150vw)} }
    @keyframes cloudMove3 { from{transform:translateX(0)} to{transform:translateX(155vw)} }

    /* ── App ── */
    .app {
      position: relative;
      width: 90vw;
      max-width: 90vw;
      margin: 0 auto;
      z-index: 2;
    }

    /* ── Top bar ── */
    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 18px;
      flex-wrap: wrap;
    }
    .badge {
      background:rgba(255,255,255,.7); backdrop-filter:blur(10px);
      border:2px solid rgba(255,255,255,.45); padding:10px 18px;
      border-radius:999px; font-weight:900;
      box-shadow:0 10px 24px rgba(0,0,0,.08);
    }
    .nav-btn {
      border:none; cursor:pointer; padding:12px 18px; border-radius:999px;
      font-size:1rem; font-weight:900;
      font-family:'Azim',"Trebuchet MS","Segoe UI",sans-serif;
      background:rgba(255,255,255,.82); color:var(--text);
      box-shadow:0 10px 24px rgba(0,0,0,.10);
      transition:transform .18s ease, box-shadow .18s ease;
    }
    .nav-btn:hover   { transform:translateY(-2px) scale(1.02); }
    .nav-btn:active  { transform:scale(.98); }
    .nav-btn:disabled{ opacity:.5; cursor:not-allowed; transform:none; }

    /* ══════════════════════════════════════════════
       STAGE
    ══════════════════════════════════════════════ */
    .stage {
      position: relative;
      padding-left:  calc(var(--boy-w)  * 0.42);
      padding-right: calc(var(--girl-w) * 0.42);
    }

    /* ── Characters ── */
    .char-outside {
      position: absolute;
      bottom: 0;
      z-index: 4;
      pointer-events: none;
    }
    .char-outside.left {
      width: var(--boy-w);
      left: 0;
    }
    .char-outside.right {
      width: var(--girl-w);
      right: 0;
    }
    .char-outside img {
      width: 100%;
      height: auto;
      object-fit: contain;
      display: none;
      transform-origin: center bottom;
      animation: characterAlive 2.8s ease-in-out infinite;
    }
    .char-outside.right img { animation-delay: .8s; }
    .char-outside-placeholder {
      width: 100%;
      height: calc(var(--boy-w) * 2.5);
      border-radius: 18px;
      background: rgba(255,255,255,.46);
      border: 2px dashed rgba(255,255,255,.8);
      color: #6b8eb7;
      font-weight: 900;
      font-size: max(.5rem, 1.2vmin);
      line-height: 1.3;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 6px;
      font-family: 'Azim',"Trebuchet MS","Segoe UI",sans-serif;
    }
    .char-outside.right .char-outside-placeholder {
      height: calc(var(--girl-w) * 2.5);
    }
    @keyframes characterAlive {
      0%,100% { transform:translateY(0);    }
      25%      { transform:translateY(-3px); }
      50%      { transform:translateY(-9px); }
      75%      { transform:translateY(-4px); }
    }

    /* ══════════════════════════════════════════════
       PAGE CARD
    ══════════════════════════════════════════════ */
    .page-card {
      position: relative;
      background: rgba(255,255,255,.70);
      backdrop-filter: blur(14px);
      border: 2px solid rgba(255,255,255,.45);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: clamp(14px,2.5vw,22px);
      animation: pagePop .6s ease;
    }
    @keyframes pagePop {
      from { transform:translateY(18px) scale(.985); opacity:0; }
      to   { transform:translateY(0)    scale(1);    opacity:1; }
    }
    .page-card::before {
      content:""; position:absolute; inset:0; pointer-events:none;
      background:
        radial-gradient(circle at top left,    rgba(255,255,255,.38), transparent 30%),
        radial-gradient(circle at bottom right,rgba(255,255,255,.28), transparent 28%);
      border-radius: var(--radius);
    }

    .outer-grid { display: block; }

    /* ══════════════════════════════════════════════
       CONTENT GRID — 2 kolum utama
    ══════════════════════════════════════════════ */
    .content-col {
      display: grid;
      grid-template-columns: minmax(0,1.05fr) minmax(280px,.88fr);
      gap: 16px;
      align-items: stretch;
    }

    /* ── Visual Panel (Gambar) ── */
    .visual-panel {
      position: relative;
      border-radius: 24px;
      overflow: hidden;
      background: linear-gradient(180deg,rgba(219,234,254,.72) 0%,rgba(245,208,254,.72) 100%);
      box-shadow: inset 0 0 0 2px rgba(255,255,255,.7);
      display: flex;
      flex-direction: column;
      align-items: stretch;
      justify-content: space-between;
      /* Desktop: match side panel height naturally */
      min-height: 520px;
    }

    /* ── Gambar utama dalam visual panel ── */
    .visual-image-wrapper {
      position: relative;
      flex: 1 1 0;
      width: 100%;
      /* Ensure the wrapper has a measurable height so absolute children work */
      min-height: 0;
    }
    .main-image {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: contain;
      object-position: center;
      display: none;
      background: rgba(255,255,255,.72);
      padding: 14px;
    }
    .image-placeholder {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
      font-size: clamp(1rem,2vw,1.25rem);
      font-weight: 900;
      color: #475569;
      background: linear-gradient(135deg,rgba(255,255,255,.24),rgba(255,255,255,.05));
      font-family: 'Azim',"Trebuchet MS","Segoe UI",sans-serif;
    }
    .placeholder-box {
      background: rgba(255,255,255,.72);
      border: 2px dashed #bfd6ff;
      border-radius: 22px;
      padding: 22px 18px;
      max-width: 380px;
      line-height: 1.5;
    }

    /* ══════════════════════════════════════════════
       NAVIGATION BAR — di bawah gambar (dalam visual panel)
    ══════════════════════════════════════════════ */
    .nav-bar {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
      padding: 14px 20px;
      background: rgba(255,255,255,0.55);
      backdrop-filter: blur(8px);
      border-top: 1.5px solid rgba(255,255,255,0.6);
      border-radius: 0 0 24px 24px;
      flex-shrink: 0;
    }

    /* ── Butang emoji kiri / kanan ── */
    .nav-arrow-btn {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      border: 2.5px solid rgba(255,255,255,0.9);
      background: rgba(255,255,255,0.82);
      box-shadow: 0 6px 18px rgba(0,0,0,0.13), inset 0 1px 0 rgba(255,255,255,0.9);
      cursor: pointer;
      font-size: 1.5rem;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.18s ease, box-shadow 0.18s ease, background 0.18s ease;
      flex-shrink: 0;
      user-select: none;
    }
    .nav-arrow-btn:hover:not(:disabled) {
      transform: translateY(-3px) scale(1.08);
      box-shadow: 0 10px 24px rgba(0,0,0,0.18);
      background: rgba(255,255,255,0.96);
    }
    .nav-arrow-btn:active:not(:disabled) {
      transform: scale(0.93);
      box-shadow: 0 3px 10px rgba(0,0,0,0.12);
    }
    .nav-arrow-btn:disabled {
      opacity: 0.38;
      cursor: not-allowed;
      transform: none;
    }

    /* ── Page badge dalam nav bar ── */
    .nav-page-badge {
      flex: 1;
      text-align: center;
      font-weight: 900;
      font-size: clamp(0.8rem, 1.8vw, 1rem);
      color: var(--text);
      font-family: 'Azim',"Trebuchet MS","Segoe UI",sans-serif;
      white-space: nowrap;
    }

    /* ── Side panel ── */
    .side-panel { display:flex; flex-direction:column; gap:14px; min-width:0; }

    .title-box {
      background:linear-gradient(135deg,rgba(255,255,255,.82),rgba(255,255,255,.58));
      border-radius:22px; padding:18px;
      box-shadow:0 12px 28px rgba(0,0,0,.08);
    }
    .mini-label {
      display:inline-block; background:#fff1b8; color:#8a5500;
      font-weight:900; font-size:.85rem; padding:8px 12px;
      border-radius:999px; margin-bottom:10px;
      font-family:'Azim',"Trebuchet MS","Segoe UI",sans-serif;
    }
    .page-title {
      font-size:clamp(1.7rem,3vw,2.6rem); line-height:1.1;
      font-weight:1000; margin-bottom:8px;
      font-family:'Azim',"Trebuchet MS","Segoe UI",sans-serif;
    }
    .page-subtitle {
      font-size:1rem; line-height:1.6; color:#526179; font-weight:700;
      font-family:'Azim',"Trebuchet MS","Segoe UI",sans-serif;
    }

    /* ── Audio panel ── */
    .audio-panel {
      background:linear-gradient(180deg,rgba(255,255,255,.84),rgba(248,250,252,.72));
      border-radius:22px; padding:16px;
      box-shadow:0 12px 28px rgba(0,0,0,.08);
      display:flex; flex-direction:column; gap:10px;
    }
    .audio-heading { font-size:1.1rem; font-weight:1000; font-family:'Azim',"Trebuchet MS","Segoe UI",sans-serif; }
    #audioList { display:flex; flex-direction:column; gap:10px; }

    .audio-btn {
      width:100%; border:none; cursor:pointer; border-radius:16px;
      padding:13px 14px; font-size:.97rem; font-weight:900;
      font-family:'Azim',"Trebuchet MS","Segoe UI",sans-serif;
      color:white; transition:transform .18s ease,filter .18s ease, box-shadow .18s ease;
      box-shadow:0 8px 20px rgba(0,0,0,.12);
      display:flex; justify-content:space-between; align-items:center; gap:10px;
    }
    .audio-btn:hover  { transform:translateY(-2px); filter:brightness(1.06); box-shadow:0 12px 28px rgba(0,0,0,.18); }
    .audio-btn:active { transform:scale(.97); filter:brightness(.96); }
    .audio-btn.playing{ outline:3px solid rgba(255,255,255,.75); filter:brightness(1.08); }
    .audio-btn.a1 { background:linear-gradient(135deg,#ff7a59,#ffb347); }
    .audio-btn.a2 { background:linear-gradient(135deg,#6d5efc,#4facfe); }
    .audio-btn.a3 { background:linear-gradient(135deg,#22c55e,#84cc16); }
    .audio-btn.a4 { background:linear-gradient(135deg,#f43f5e,#fb7185); }
    .audio-btn.a5 { background:linear-gradient(135deg,#14b8a6,#2dd4bf); }
    .audio-btn.a6 { background:linear-gradient(135deg,#f59e0b,#fbbf24); }

    .audio-action { flex-shrink:0; white-space:nowrap; }
    .audio-label  { flex:1; text-align:right; line-height:1.35; }
    .audio-label.is-arabic {
      font-family:'SakkalMajalla',serif; direction:rtl; unicode-bidi:plaintext;
      text-align:right; font-size:1.6rem; font-weight:400; line-height:1.25;
    }

    /* ══════════════════════════════════════════════
       PAGE JUMP — di bawah audio panel
    ══════════════════════════════════════════════ */
    .page-jump-panel {
      background: linear-gradient(135deg,rgba(255,255,255,.82),rgba(255,255,255,.58));
      border-radius: 22px;
      padding: 14px 16px;
      box-shadow: 0 12px 28px rgba(0,0,0,.08);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }
    .page-jump-label {
      font-size: .88rem;
      font-weight: 900;
      color: var(--text);
      white-space: nowrap;
      font-family: 'Azim',"Trebuchet MS","Segoe UI",sans-serif;
      flex-shrink: 0;
    }
    .page-input {
      width: 64px;
      height: 38px;
      padding: 0 10px;
      font-size: .95rem;
      font-weight: 800;
      text-align: center;
      border-radius: 12px;
      border: 2px solid rgba(109,94,252,0.3);
      background: rgba(255,255,255,0.9);
      color: var(--text);
      font-family: 'Azim',"Trebuchet MS","Segoe UI",sans-serif;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
      outline: none;
      /* hide arrows on number input */
      -moz-appearance: textfield;
      appearance: textfield;
    }
    .page-input::-webkit-inner-spin-button,
    .page-input::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
    .page-input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(109,94,252,0.18);
    }
    .jump-btn {
      height: 38px;
      padding: 0 18px;
      font-size: .9rem;
      font-weight: 900;
      border-radius: 12px;
      background: linear-gradient(135deg, #6d5efc, #4facfe);
      color: white;
      border: none;
      cursor: pointer;
      font-family: 'Azim',"Trebuchet MS","Segoe UI",sans-serif;
      box-shadow: 0 6px 16px rgba(109,94,252,0.3);
      transition: transform 0.18s ease, box-shadow 0.18s ease, filter 0.18s ease;
      white-space: nowrap;
    }
    .jump-btn:hover {
      transform: translateY(-2px) scale(1.03);
      box-shadow: 0 10px 22px rgba(109,94,252,0.38);
      filter: brightness(1.06);
    }
    .jump-btn:active {
      transform: scale(0.96);
      box-shadow: 0 4px 10px rgba(109,94,252,0.22);
    }
    .jump-btn:disabled {
      opacity: 0.45;
      cursor: not-allowed;
      transform: none;
    }

    /* ══════════════════════════════════════════════
       RESPONSIVE
    ══════════════════════════════════════════════ */

    /* Tablet — single column, image fills width */
    @media (max-width: 960px) {
      .content-col  { grid-template-columns: 1fr; }
      /* On single-column layout the panel must have an explicit height
         because flex: 1 has nothing to stretch against */
      .visual-panel        { min-height: 60vw; max-height: 520px; }
      .visual-image-wrapper{ min-height: 0; height: 100%; }
      .topbar       { justify-content: center; }
      .stage { padding: 0 calc(var(--boy-w) * 0.3); }
    }

    /* Small tablet */
    @media (max-width: 680px) {
      :root { --boy-w: 15vmin; --girl-w: 12vmin; }
      .visual-panel { min-height: 65vw; max-height: none; }
      .nav-arrow-btn { width: 46px; height: 46px; font-size: 1.3rem; }
    }

    /* Phone */
    @media (max-width: 480px) {
      :root { --boy-w: 12vmin; --girl-w: 10vmin; }
      .char-outside { display: none; }
      .stage { padding: 0; }
      body  { padding: 12px 5vw; }
      .topbar { justify-content: center; }
      .badge  { width:100%; text-align:center; }
      .topbar > .nav-btn:not(.jump-btn) { width:100%; text-align:center; }
      /* Image fills nearly the full viewport width on phones */
      .visual-panel        { min-height: 75vw; max-height: none; }
      .visual-image-wrapper{ height: 100%; }
      .main-image          { padding: 8px; }
      .audio-btn           { font-size: .9rem; padding: 11px 10px; }
      .audio-label.is-arabic { font-size: 1.3rem; }

      .nav-arrow-btn  { width: 42px; height: 42px; font-size: 1.2rem; }
      .nav-page-badge { font-size: .78rem; }
      .nav-bar        { padding: 10px 14px; gap: 10px; }

      .page-jump-panel { padding: 12px 14px; gap: 8px; }
      .page-input  { width: 52px; height: 34px; font-size: .88rem; }
      .jump-btn    { height: 34px; padding: 0 14px; font-size: .85rem; }
      .page-jump-label { font-size: .8rem; }
    }
  </style>
</head>
<body>

  <div class="blob b1"></div>
  <div class="blob b2"></div>
  <div class="blob b3"></div>
  <div class="blob b4"></div>

  <div class="sparkles">
    <span class="sparkle" style="top:8%;  left:14%; animation-delay:0s;  "></span>
    <span class="sparkle" style="top:16%; left:52%; animation-delay:.8s; "></span>
    <span class="sparkle" style="top:28%; left:82%; animation-delay:1.2s;"></span>
    <span class="sparkle" style="top:48%; left:8%;  animation-delay:.6s; "></span>
    <span class="sparkle" style="top:55%; left:62%; animation-delay:1.7s;"></span>
    <span class="sparkle" style="top:72%; left:28%; animation-delay:.9s; "></span>
    <span class="sparkle" style="top:84%; left:76%; animation-delay:1.4s;"></span>
    <span class="sparkle" style="top:12%; left:92%; animation-delay:2s;  "></span>
  </div>

  <div class="cloud-stage">
    <div class="cloud cloud1">
      <div class="cloud-fallback" id="cloudFallback1">LETAK<br>AWAN 1</div>
      <img id="cloudImg1" alt="Awan 1">
    </div>
    <div class="cloud cloud2">
      <div class="cloud-fallback" id="cloudFallback2">LETAK<br>AWAN 2</div>
      <img id="cloudImg2" alt="Awan 2">
    </div>
    <div class="cloud cloud3">
      <div class="cloud-fallback" id="cloudFallback3">LETAK<br>AWAN 3</div>
      <img id="cloudImg3" alt="Awan 3">
    </div>
  </div>

  <div class="app"> <br><br><br><br>
    <div class="stage">

      <!-- BOY — kiri -->
      <div class="char-outside left" id="charOutsideLeft">
        <div class="char-outside-placeholder" id="leftCharPlaceholder">LETAK<br>BOY</div>
        <img id="leftCharImg" alt="Boy Character">
      </div>

      <!-- GIRL — kanan -->

    /* ── State ── */
    let currentIndex      = 0;
    let currentAudioIndex = -1;
    let isPaused          = false;

    /* ── DOM ── */
    const pageBadge        = document.getElementById("pageBadge");
    const pageSubtitle     = document.getElementById("pageSubtitle");
    const mainImage        = document.getElementById("mainImage");
    const imagePlaceholder = document.getElementById("imagePlaceholder");
    const leftCharImg      = document.getElementById("leftCharImg");
    const rightCharImg     = document.getElementById("rightCharImg");
    const leftCharPH       = document.getElementById("leftCharPlaceholder");
    const rightCharPH      = document.getElementById("rightCharPlaceholder");
    const cloudImgs        = [document.getElementById("cloudImg1"), document.getElementById("cloudImg2"), document.getElementById("cloudImg3")];
    const cloudFBs         = [document.getElementById("cloudFallback1"), document.getElementById("cloudFallback2"), document.getElementById("cloudFallback3")];
    const audioListEl      = document.getElementById("audioList");
    let   audioButtons     = [];

    const prevBtn   = document.getElementById("prevBtn");
    const nextBtn   = document.getElementById("nextBtn");
    const player    = document.getElementById("player");
    const pageInput = document.getElementById("pageInput");
    const jumpBtn   = document.getElementById("jumpBtn");

    /* ── Helpers ── */
    const isArabic = t => /[\u0600-\u06FF\u0750-\u077F\u08A0-\u08FF\uFB50-\uFDFF\uFE70-\uFEFF]/.test(t || "");

    function styleLabelEl(el, text) {
      el.textContent = text;
      const ar = isArabic(text);
      el.classList.toggle("is-arabic", ar);
      el.setAttribute("dir",  ar ? "rtl" : "auto");
      el.setAttribute("lang", ar ? "ar"  : "ms");
    }

    function resetButtons() {
      audioButtons.forEach(b => {
        b.classList.remove("playing");
        const a = b.querySelector(".audio-action");
        if(a) a.textContent = "▶ Mula";
      });
    }

    function stopAudio() {
      player.pause();
      player.currentTime = 0;
      player.removeAttribute("src");
      currentAudioIndex = -1;
      isPaused = false;
      resetButtons();
    }

    function loadImg(img, ph, src) {
      if(!img) return;
      if(src && src.trim()){
        img.src = src;
        img.style.display = "block";
        if(ph) ph.style.display = "none";
        img.onerror = () => { img.style.display = "none"; if(ph) ph.style.display = "flex"; };
      } else {
        img.removeAttribute("src");
        img.style.display = "none";
        if(ph) ph.style.display = "flex";
      }
    }

    /* ── Render ── */
    function setupPage() {
      const p = BOOK_PAGES[currentIndex];
      stopAudio();

      pageSubtitle.textContent = "Tekan butang audio di bawah untuk mula atau berhentikan audio.";
      pageBadge.textContent    = `Halaman ${currentIndex + 1} / ${BOOK_PAGES.length}`;
      pageInput.value = currentIndex + 1;
      pageInput.max   = BOOK_PAGES.length;

      if(p.image && p.image.trim()){
        mainImage.src = p.image;
        mainImage.style.display = "block";
        imagePlaceholder.style.display = "none";
        mainImage.onerror = () => {
          mainImage.style.display = "none";
          imagePlaceholder.style.display = "flex";
          imagePlaceholder.innerHTML = `<div class="placeholder-box">GAMBAR TAK JUMPA<br><br>Semak path:<br><strong>${p.image}</strong></div>`;
        };
      } else {
        mainImage.removeAttribute("src");
        mainImage.style.display = "none";
        imagePlaceholder.style.display = "flex";
        imagePlaceholder.innerHTML = `<div class="placeholder-box">LETAK GAMBAR PAGE ${currentIndex + 1} DI SINI<br><br>Contoh: <strong>../assets/pages/page${currentIndex + 1}.jpg</strong></div>`;
      }

      loadImg(leftCharImg, leftCharPH, p.leftCharacter || "");
      loadImg(rightCharImg, rightCharPH, p.rightCharacter || "");

      const clouds = Array.isArray(p.clouds) ? p.clouds : ["", "", ""];
      cloudImgs.forEach((img, i) => loadImg(img, cloudFBs[i], clouds[i] || ""));

      audioListEl.innerHTML = "";
      audioButtons = [];
      (p.audios || []).filter(i => i && i.show).forEach((item, idx) => {
        const btn = document.createElement("button");
        btn.type = "button";
        btn.className = `audio-btn a${Math.min(idx + 1, 6)}`;
        btn.innerHTML = `<span class="audio-action">▶ Mula</span><span class="audio-label"></span>`;
        styleLabelEl(btn.querySelector(".audio-label"), item.label || `Perkataan ${idx + 1}`);
        btn.dataset.file = item.file || "";
        btn.addEventListener("click", () => toggleAudio(idx));
        audioListEl.appendChild(btn);
        audioButtons.push(btn);
      });

      prevBtn.disabled = currentIndex === 0;
      nextBtn.disabled = currentIndex === BOOK_PAGES.length - 1;
    }

    /* ── Audio toggle ── */
    function toggleAudio(i) {
      const btn = audioButtons[i];
      if (!btn) return;
      const file = btn.dataset.file || "";
      const act = btn.querySelector(".audio-action");
      if (!file.trim()) return;

      if (currentAudioIndex === i) {
        if (!player.paused) {
          player.pause();
          isPaused = true;
          btn.classList.remove("playing");
          act.textContent = "▶ Mula";
        } else {
          player.play().then(() => {
            isPaused = false;
            btn.classList.add("playing");
            act.textContent = "⏸ Berhenti";
          }).catch(() => {});
        }
        return;
      }

      stopAudio();
      player.src = file;
      player.load();
      player.play().then(() => {
        currentAudioIndex = i;
        isPaused = false;
        btn.classList.add("playing");
        act.textContent = "⏸ Berhenti";
      }).catch(() => stopAudio());
    }

    player.addEventListener("ended", () => {
      resetButtons();
      currentAudioIndex = -1;
      isPaused = false;
    });

    player.addEventListener("pause", () => {
      if (currentAudioIndex !== -1 && !player.ended && isPaused) {
        const b = audioButtons[currentAudioIndex];
        if (b) {
          b.classList.remove("playing");
          const a = b.querySelector(".audio-action");
          if (a) a.textContent = "▶ Mula";
        }
      }
    });

    /* ── Navigation ── */
    function goToPage(i) {
      if (i < 0 || i >= BOOK_PAGES.length) return;
      currentIndex = i;
      setupPage();
    }

    const nextPage = () => goToPage(currentIndex + 1);
    const prevPage = () => goToPage(currentIndex - 1);

    function jumpToPage() {
      const v = Number(pageInput.value);
      if (!Number.isInteger(v) || v < 1 || v > BOOK_PAGES.length) return;
      goToPage(v - 1);
    }

    prevBtn.addEventListener("click", prevPage);
    nextBtn.addEventListener("click", nextPage);
    jumpBtn.addEventListener("click", jumpToPage);
    pageInput.addEventListener("keydown", e => { if (e.key === "Enter") jumpToPage(); });

    document.addEventListener("keydown", e => {
      if (e.key === "ArrowRight") nextPage();
      if (e.key === "ArrowLeft") prevPage();
    });

    setupPage();
  </script>
